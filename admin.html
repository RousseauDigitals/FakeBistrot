<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration — Le Bistrot Fictif</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --cream: #F5F0E8; --dark: #1A1008; --gold: #D4A017; --border: rgba(26, 16, 8, 0.15); }
        body { font-family: 'DM Sans', sans-serif; background: #FAF7F2; color: var(--dark); margin: 0; padding-bottom: 50px; }
        header { background: var(--dark); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); }
        .logo { font-family: 'Playfair Display'; color: var(--gold); text-decoration: none; font-size: 1.2rem; }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 20px; }
        
        h2 { font-family: 'Playfair Display'; border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-top: 40px; }

        /* Style des inputs dans l'admin */
        input, select, textarea { 
            width: 100%; padding: 10px; margin: 5px 0; border: 1px solid var(--border); 
            font-family: 'DM Sans'; box-sizing: border-box;
        }

        /* Grid Plats Modifiables */
        .grid-plats { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card-plat { background: white; border: 1px solid var(--border); padding: 15px; }
        
        /* Correction du dimensionnement des images */
        .img-preview { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; /* Assure que l'image remplit l'espace sans se déformer */
            background: #eee; 
            margin-bottom: 10px; 
            display: block; 
            border-radius: 4px;
        }

        /* Planning */
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { background: var(--dark); color: var(--gold); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }

        .btn { background: var(--dark); color: var(--gold); border: 1px solid var(--gold); padding: 10px 20px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: white; }
        .btn-save { background: #27ae60; color: white; border: none; margin-top: 10px; width: 100%; }
        
        .no-tel { color: #999; font-style: italic; }
		.admin-title{
  font-size:1.2rem;
  letter-spacing:0.5px;
  margin-bottom:12px;
  color:var(--text);
}

/* TITRE CENTRÉ */
.admin-title{
  text-align:center;
  font-size:1.3rem;
  margin-bottom:14px;
  color:var(--text);
  letter-spacing:0.5px;
}

/* BAR UNE LIGNE SANS SCROLL */
.admin-inline-bar{
  display:flex;
  flex-wrap:nowrap;
  justify-content:center;
  align-items:center;
  gap:8px;

  padding:12px;
  border-radius:12px;

  background: linear-gradient(145deg, #1b1b1b, #111);
  border:1px solid rgba(212,175,55,0.25);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);

  max-width:100%;
}

/* INPUTS PLUS PETITS */
.admin-input{
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(212,175,55,0.25);
  color:#f5f0e8;

  padding:6px 8px;          /* 👈 réduit */
  border-radius:6px;
  font-size:0.78rem;        /* 👈 réduit */

  outline:none;

  width:120px;              /* 👈 fixe pour éviter slide */
  flex:0 0 auto;
}

/* champs spécifiques plus adaptés */
#resa-prenom, #resa-nom{
  width:110px;
}

#resa-tel{
  width:130px;
}

#resa-couverts{
  width:90px;

  background: rgba(212,175,55,0.08); /* léger doré au lieu de gris */
  border:1px solid rgba(212,175,55,0.6); /* plus visible */
  color:#f5f0e8;

  font-weight:500;
}

/* focus luxe */
.admin-input:focus{
  border-color:#d4af37;
  box-shadow:0 0 0 2px rgba(212,175,55,0.15);
}

/* bouton compact */
.admin-btn{
  padding:7px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;

  background: linear-gradient(90deg, #d4af37, #f2d57e);
  color:#111;
  font-weight:600;
  font-size:0.8rem;

  flex:0 0 auto;
  transition:0.2s ease;
}

.admin-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(212,175,55,0.25);
}
#resa-couverts option{
  background: #111;
  color: #f5f0e8;
}

#resa-couverts option:checked,
#resa-couverts option:hover{
  background: rgba(212,175,55,0.25);
  color: #fff;
}
.admin-login{
  max-width:300px;
  margin:80px auto;
  padding:20px;
  text-align:center;

  background: linear-gradient(145deg, #1b1b1b, #111);
  border:1px solid rgba(212,175,55,0.25);
  border-radius:12px;
  color:#f5f0e8;
}

.admin-login input{
  width:100%;
  padding:10px;
  margin-top:10px;

  background: rgba(255,255,255,0.05);
  border:1px solid rgba(212,175,55,0.25);
  color:#fff;
  border-radius:6px;
}

.admin-login button{
  margin-top:10px;
  width:100%;
  padding:10px;

  background: linear-gradient(90deg, #d4af37, #f2d57e);
  border:none;
  border-radius:6px;
  font-weight:600;
  cursor:pointer;
}
    </style>
</head>
<body>
<div id="admin-login" class="admin-login">

  <h2>Accès Admin</h2>

  <input type="password" id="admin-pass" placeholder="Mot de passe">

  <button onclick="checkAdmin()">Se connecter</button>

  <p id="login-error" style="color:red; display:none; margin-top:10px;">
    Mot de passe incorrect
  </p>

</div>

<div id="admin-panel" style="display:none;">
  <!-- 👉 ICI tu mets ton interface admin actuelle -->

<header>
    <a href="index.html" class="logo">LE BISTROT FICTIF — ADMIN</a>
    <button class="btn" onclick="location.reload()">Actualiser</button>
</header>
<h2 class="admin-title">Ajouter une réservation</h2>

<div class="admin-inline-bar">

  <input type="date" id="resa-date" class="admin-input">
  <input type="time" id="resa-heure" class="admin-input">

  <input type="text" id="resa-prenom" placeholder="Prénom" class="admin-input">
  <input type="text" id="resa-nom" placeholder="Nom" class="admin-input">
  <input type="text" id="resa-tel" placeholder="Téléphone" class="admin-input">

  <select id="resa-couverts" class="admin-input">
  <option value="" disabled selected>Couverts</option>
</select>

  <button class="admin-btn" onclick="addResa()">Ajouter</button>

</div>
<div class="container">
    
    <h2>Planning des Réservations</h2>
    <table>
        <thead>
            <tr>
                <th>Date / Heure</th>
                <th>Client</th>
                <th>Téléphone</th>
                <th>Couverts</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="resas-body"></tbody>
    </table>

    <h2>Modifier les Plats Signatures</h2>
    <button class="btn" onclick="addPlat()" style="margin-bottom:16px">+ Ajouter un plat</button>
    <div id="plats-list" class="grid-plats"></div>

</div>

<script>
// ─────────────────────────────────────────────
//  CONFIG — mot de passe identique à ADMIN_SECRET
//  dans les variables d'environnement Netlify
// ─────────────────────────────────────────────
let ADMIN_SECRET = ''; // rempli après connexion
let siteData = { plats: [], reservations: [] };

// ─── AUTHENTIFICATION ───────────────────────
function checkAdmin() {
  const pass = document.getElementById('admin-pass').value;
  if (!pass) return;
  ADMIN_SECRET = pass;
  loadAllData(); // on vérifie en chargeant
}

document.getElementById('admin-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAdmin();
});

// ─── CHARGEMENT DONNÉES ─────────────────────
async function loadAllData() {
  try {
    const res = await fetch('/.netlify/functions/get-data');
    if (!res.ok) throw new Error('Erreur réseau');
    siteData = await res.json();
    siteData.plats = siteData.plats || [];
    siteData.reservations = siteData.reservations || [];

    // Connexion réussie — on affiche le panel
    document.getElementById('admin-login').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';

    renderPlats();
    renderPlanning();
    initCouverts();
  } catch(e) {
    document.getElementById('login-error').style.display = 'block';
    ADMIN_SECRET = '';
  }
}

// ─── SAUVEGARDE GLOBALE ──────────────────────
async function saveData(successMsg) {
  const res = await fetch('/.netlify/functions/save-data', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-admin-secret': ADMIN_SECRET,
    },
    body: JSON.stringify(siteData, null, 2),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (res.status === 401) {
      alert('Mot de passe incorrect ou expiré.');
    } else {
      alert('Erreur lors de la sauvegarde : ' + (err.error || res.status));
    }
    return false;
  }

  if (successMsg) alert(successMsg);
  return true;
}

// ─── PLATS ───────────────────────────────────
function renderPlats() {
  const container = document.getElementById('plats-list');
  if (siteData.plats.length === 0) {
    container.innerHTML = '<p style="color:#999">Aucun plat. Cliquez sur "Ajouter un plat" ci-dessous.</p>';
    return;
  }

  container.innerHTML = siteData.plats.map((p, i) => `
    <div class="card-plat">
      <img src="${p.img || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22200%22><rect width=%22400%22 height=%22200%22 fill=%22%23eee%22/><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2240%22>🍽️</text></svg>'}"
           class="img-preview" id="prev-${i}" alt="Aperçu plat">

      <label style="font-size:0.75rem;color:#666">Changer la photo :</label>
      <input type="file" accept="image/*" onchange="updateImage(event, ${i})" style="font-size: 0.75rem; margin-bottom:8px">

      <label>Nom du plat :</label>
      <input type="text" value="${p.nom}" id="nom-${i}" placeholder="Ex: Entrecôte grillée">

      <label>Prix (€) :</label>
      <input type="text" value="${p.prix}" id="prix-${i}" placeholder="Ex: 24">

      <label>Description :</label>
      <textarea id="desc-${i}" rows="3" placeholder="Description du plat...">${p.desc}</textarea>

      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-save" style="flex:1" onclick="savePlat(${i})">💾 Enregistrer</button>
        <button class="btn" style="background:#c0392b;color:white;border-color:#c0392b;flex:0 0 auto" onclick="deletePlat(${i})">🗑</button>
      </div>
    </div>
  `).join('');
}

async function savePlat(i) {
  siteData.plats[i].nom  = document.getElementById(`nom-${i}`).value;
  siteData.plats[i].prix = document.getElementById(`prix-${i}`).value;
  siteData.plats[i].desc = document.getElementById(`desc-${i}`).value;
  await saveData('✅ Plat enregistré !');
}

async function deletePlat(i) {
  if (!confirm('Supprimer ce plat du site ?')) return;
  siteData.plats.splice(i, 1);
  await saveData();
  renderPlats();
}

function addPlat() {
  siteData.plats.push({ nom: 'Nouveau plat', prix: '0', desc: '', img: '' });
  renderPlats();
  document.getElementById('plats-list').lastElementChild.scrollIntoView({ behavior: 'smooth' });
}

function updateImage(event, i) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 1000; canvas.height = 700;
      const ctx = canvas.getContext('2d');
      const ratio = Math.max(canvas.width / img.width, canvas.height / img.height);
      const x = (canvas.width - img.width * ratio) / 2;
      const y = (canvas.height - img.height * ratio) / 2;
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, x, y, img.width * ratio, img.height * ratio);
      siteData.plats[i].img = canvas.toDataURL('image/jpeg', 0.8);
      document.getElementById(`prev-${i}`).src = siteData.plats[i].img;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ─── RÉSERVATIONS ────────────────────────────
function renderPlanning() {
  const body = document.getElementById('resas-body');
  const resas = [...siteData.reservations];
  resas.sort((a, b) => new Date(a.date + 'T' + (a.heure||'00:00')) - new Date(b.date + 'T' + (b.heure||'00:00')));

  if (resas.length === 0) {
    body.innerHTML = '<tr><td colspan="5" style="color:#999;text-align:center;padding:20px">Aucune réservation</td></tr>';
    return;
  }

  body.innerHTML = resas.map((r, i) => {
    const displayTel = r.tel && r.tel !== 'undefined' ? r.tel : 'Non renseigné';
    const telLink = r.tel && r.tel !== 'undefined'
      ? `<a href="tel:${r.tel}">${r.tel}</a>`
      : `<span class="no-tel">${displayTel}</span>`;
    const origIndex = siteData.reservations.indexOf(r);
    return `
      <tr>
        <td>${r.date} à <strong>${r.heure}</strong></td>
        <td>${r.prenom} ${r.nom ? r.nom.toUpperCase() : ''}</td>
        <td>${telLink}</td>
        <td>${r.couverts} pers.</td>
        <td><button onclick="deleteResa(${origIndex})" style="color:red;border:none;background:none;cursor:pointer;">Supprimer</button></td>
      </tr>
    `;
  }).join('');
}

async function deleteResa(i) {
  if (!confirm('Voulez-vous vraiment supprimer cette réservation ?')) return;
  siteData.reservations.splice(i, 1);
  const ok = await saveData();
  if (ok) renderPlanning();
}

function initCouverts() {
  const sel = document.getElementById('resa-couverts');
  sel.innerHTML = '<option value="" disabled selected>Couverts</option>';
  for (let i = 1; i <= 12; i++) {
    sel.innerHTML += `<option value="${i}">${i} couvert${i > 1 ? 's' : ''}</option>`;
  }
}

async function addResa() {
  const resa = {
    id: Date.now(),
    date:     document.getElementById('resa-date').value,
    heure:    document.getElementById('resa-heure').value,
    prenom:   document.getElementById('resa-prenom').value,
    nom:      document.getElementById('resa-nom').value,
    tel:      document.getElementById('resa-tel').value,
    couverts: document.getElementById('resa-couverts').value,
  };

  if (!resa.date || !resa.heure || !resa.prenom) {
    alert('Merci de remplir les champs obligatoires (date, heure, prénom)');
    return;
  }

  siteData.reservations.push(resa);
  const ok = await saveData('✅ Réservation ajoutée !');
  if (ok) renderPlanning();
}
</script>
</body>
</html>
